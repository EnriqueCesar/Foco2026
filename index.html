<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FOCO 2026</title>
  <link rel="manifest" href="manifest.webmanifest?v=6.8.27">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
  <link rel="stylesheet" href="style.css?v=6.8.27">
</head>
<body>
  <header class="appTop">
    <div class="brandLockup">
      <div class="mark"><img src="assets/icons/icon-96.png" alt="FOCO 2026"></div>
      <div class="appTitle">
        <h1>FOCO 2026</h1>
        <p id="appSubtitle">Dashboard ejecutivo Starbucks</p>
      </div>
    </div>
    <nav class="tabs" aria-label="Vistas FOCO">
      <button class="tab active" data-view="rd">RD</button>
      <button class="tab" data-view="dm">DM</button>
      <button class="tab" data-view="tienda">Tienda</button>
    </nav>
  </header>

  <main class="wrap">
    <section id="filters" class="filters rd">
      <div class="field">
        <label>Mes</label>
        <select id="mes"></select>
      </div>
      <div class="field" id="regionWrap">
        <label>RD / Región</label>
        <select id="region"></select>
      </div>
      <div class="field hide" id="dmWrap">
        <label>DM</label>
        <select id="dm"></select>
      </div>
<div class="field hide" id="storeWrap">
  <label>Tienda</label>
  <select id="store"></select>
</div>
      <div class="field exportWrap">
        <label>&nbsp;</label>
        <button id="exportBtn" class="exportBtn" type="button">⬇ Exportar PDF</button>
      </div>
    </section>

    <section id="context" class="contextLine"></section>
    <section id="printHeader" class="printHeader"></section>
    <section id="content" class="view"></section>
  </main>

  <script src="data.js?v=6.8.27"></script>
  <script src="app.js?v=6.8.27"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js?v=6.8.27'));
    }
  </script>
</body>
</html>
