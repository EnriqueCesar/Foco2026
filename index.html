<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FOCO 2026 V6.4 PWA</title>
  <link rel="stylesheet" href="style.css?v=6.4">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
  <meta name="theme-color" content="#006241">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FOCO 2026">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <header class="appTop">
    <div class="brandLockup">
      <img class="mark logoMark" src="assets/icons/icon-192.png" alt="FOCO 2026">
      <div class="appTitle">
        <h1>FOCO 2026</h1>
        <p id="appSubtitle">Dashboard ejecutivo Starbucks</p>
      </div>
    </div>
    <nav class="tabs" aria-label="Vistas FOCO">
      <button class="tab active" data-view="rd">RD</button>
      <button class="tab" data-view="dm">DM</button>
      <button class="tab" data-view="tienda">Tienda</button>
    </nav>
  </header>

  <main class="wrap">
    <section id="filters" class="filters rd">
      <div class="field">
        <label>Mes</label>
        <select id="mes"></select>
      </div>
      <div class="field" id="regionWrap">
        <label>RD / Región</label>
        <select id="region"></select>
      </div>
      <div class="field hide" id="dmWrap">
        <label>DM</label>
        <select id="dm"></select>
      </div>
<div class="field hide" id="storeWrap">
  <label>Tienda</label>
  <select id="store"></select>
</div>
    <button id="exportBtn" class="exportBtn" title="Exportar PDF" aria-label="Exportar PDF"><span class="exportIcon">⤓</span><span>Exportar</span></button>
    </section>

    <section id="context" class="contextLine"></section>
    <section id="content" class="view"></section>
  </main>

  <script src="data.js?v=6.4"></script>
  <script src="app.js?v=6.4"></script>
</body>
</html>
